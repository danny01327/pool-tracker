<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#38bdf8"/>

  <!-- water wave at the bottom -->
  <path d="M0 56c4 3 8 3 12 0s8-3 12 0 8 3 12 0 8-3 12 0 8 3 12 0 4-1.5 4-1.5V64H0z" fill="#0ea5e9" opacity="0.6"/>

  <!-- ground shadow -->
  <ellipse cx="29" cy="58" rx="11" ry="2.5" fill="#0369a1" opacity="0.35"/>

  <!-- legs -->
  <rect x="23" y="48" width="6" height="11" rx="2.5" fill="#1e3a8a"/>
  <rect x="31" y="48" width="6" height="11" rx="2.5" fill="#1e3a8a"/>

  <!-- left arm (down by side) -->
  <rect x="17" y="35" width="6" height="14" rx="3" fill="#f3c9a5"/>

  <!-- body/shirt -->
  <rect x="19" y="32" width="20" height="18" rx="7" fill="#fb923c"/>

  <!-- right arm reaching up to hold the net pole -->
  <path d="M36 36c3-1 6-3 8-6" stroke="#f3c9a5" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- net pole -->
  <line x1="43" y1="31" x2="55" y2="11" stroke="#92613a" stroke-width="2.5" stroke-linecap="round"/>

  <!-- net ring + mesh -->
  <circle cx="55" cy="10" r="7.5" fill="#ffffff" opacity="0.22"/>
  <circle cx="55" cy="10" r="7.5" fill="none" stroke="#ffffff" stroke-width="2.2"/>
  <path d="M49 6l12 8M49 14l12-8M52 4.5v11M58 4.5v11" stroke="#ffffff" stroke-width="0.8" opacity="0.7"/>

  <!-- head -->
  <circle cx="29" cy="21" r="9" fill="#f3c9a5"/>

  <!-- hair -->
  <path d="M20 20c0-6 4-10 9-10s9 4 9 10c-2-2-4-3-9-3s-7 1-9 3z" fill="#6b4226"/>

  <!-- face -->
  <circle cx="26" cy="21" r="1.2" fill="#3b2a1a"/>
  <circle cx="32" cy="21" r="1.2" fill="#3b2a1a"/>
  <path d="M25.5 25c1.5 1.5 4.5 1.5 6 0" stroke="#3b2a1a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
</svg>
